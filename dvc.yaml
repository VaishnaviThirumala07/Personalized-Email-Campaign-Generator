# ============================================
# DVC Pipeline Configuration
# ============================================

stages:
  preprocess_enron:
    cmd: python data/scripts/preprocess_enron.py
    deps:
      - data/raw/enron/
      - data/scripts/preprocess_enron.py
    outs:
      - data/processed/enron_clean.csv

  generate_profiles:
    cmd: python data/scripts/generate_crm_profiles.py
    deps:
      - data/scripts/generate_crm_profiles.py
    outs:
      - data/processed/crm_profiles.csv

  generate_benchmarks:
    cmd: python data/scripts/generate_benchmarks.py
    deps:
      - data/scripts/generate_benchmarks.py
    outs:
      - data/processed/benchmarks.csv
