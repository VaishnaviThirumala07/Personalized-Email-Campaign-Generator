# ============================================
# Docker Compose — Full Application Stack
# ============================================

version: "3.9"

services:
  # ── FastAPI Application ──────────────────────────
  app:
    build: .
    container_name: email-campaign-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts
    depends_on:
      - mlflow
    networks:
      - campaign-network
    restart: unless-stopped

  # ── MLflow Tracking Server ──────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    container_name: email-campaign-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - campaign-network
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: email-campaign-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - campaign-network
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: email-campaign-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - campaign-network
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────
volumes:
  mlflow-data:
  prometheus-data:
  grafana-data:

# ── Networks ─────────────────────────────────────
networks:
  campaign-network:
    driver: bridge
